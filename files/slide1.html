<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #0a0f1c; font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; }

  .circle1 {
    position: absolute; top: -80px; right: -100px;
    width: 420px; height: 420px;
    border: 90px solid rgba(0,69,139,0.15);
    border-radius: 50%;
  }
  .circle2 {
    position: absolute; bottom: -120px; left: -80px;
    width: 300px; height: 300px;
    border: 2px solid rgba(0,69,139,0.22);
    border-radius: 50%;
  }
  .vline {
    position: absolute; top: 0; left: 90px;
    width: 3px; height: 100%;
    background: #00458B; opacity: 0.55;
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    padding: 52px 56px 48px 56px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 14px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #00458B; font-weight: 700;
  }
  .num {
    position: absolute; top: 52px; right: 56px;
    font-family: 'Courier New', monospace;
    font-size: 14px; color: rgba(255,255,255,0.22);
    letter-spacing: 0.1em;
  }
  .headline {
    font-size: 86px; font-weight: 900;
    line-height: 0.95; letter-spacing: -0.02em; color: #ffffff;
    margin-bottom: 28px;
  }
  .accent { color: #60a5fa; }
  .sub {
    font-family: Arial, sans-serif;
    font-size: 22px; line-height: 1.6;
    color: rgba(255,255,255,0.52); max-width: 580px;
  }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-sq {
    width: 36px; height: 36px; background: #00458B; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text {
    font-size: 18px; font-weight: 900;
    letter-spacing: 0.2em; color: #ffffff;
  }
  .swipe {
    font-family: Arial, sans-serif;
    font-size: 16px; color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="vline"></div>
  <div class="wrap">
    <div><span class="eyebrow">@veta.systems</span></div>
    <span class="num">01/05</span>
    <div>
      <p class="headline">Tu negocio<br>creció.<br>Tu software,<br><span class="accent">no.</span></p>
      <p class="sub">Si seguís gestionando con planillas, capturas de WhatsApp y promesas — este carrusel es para vos.</p>
    </div>
    <div class="bottom">
      <div class="logo">
        <div class="logo-sq">
          <svg width="18" height="20" viewBox="0 0 18 20" fill="none"><polygon points="3,20 8.5,3 10.5,3 6.5,20" fill="white"/></svg>
        </div>
        <span class="logo-text">VETA</span>
      </div>
      <span class="swipe">Swipe →</span>
    </div>
  </div>
</body>
</html>
