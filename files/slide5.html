<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #00458B; font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; }

  .dot-bg {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .circle-deco {
    position: absolute; bottom: -60px; right: -60px;
    width: 340px; height: 340px;
    border: 56px solid rgba(255,255,255,0.07);
    border-radius: 50%;
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    padding: 52px 56px 48px 56px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .eyebrow {
    font-family: 'Courier New', monospace; font-size: 13px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.65); font-weight: 700;
  }
  .num {
    position: absolute; top: 52px; right: 56px;
    font-family: 'Courier New', monospace; font-size: 14px;
    color: rgba(255,255,255,0.22);
  }
  .headline {
    font-size: 92px; font-weight: 900;
    line-height: 0.95; letter-spacing: -0.02em; color: #ffffff;
    margin-bottom: 28px;
  }
  .sub {
    font-family: Arial, sans-serif; font-size: 21px;
    line-height: 1.6; color: rgba(255,255,255,0.72);
    max-width: 560px; margin-bottom: 30px;
  }
  .pills { display: flex; flex-wrap: wrap; gap: 10px; }
  .pill {
    border: 1px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.7);
    font-family: 'Courier New', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 8px 18px; border-radius: 40px;
  }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-sq {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.18); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text { font-size: 18px; font-weight: 900; letter-spacing: 0.2em; color: white; }
  .handle {
    font-family: 'Courier New', monospace; font-size: 13px;
    color: rgba(255,255,255,0.38); letter-spacing: 0.12em;
  }
</style>
</head>
<body>
  <div class="dot-bg"></div>
  <div class="circle-deco"></div>
  <div class="wrap">
    <div><span class="eyebrow">Siguiente paso</span></div>
    <span class="num">05/05</span>
    <div>
      <p class="headline">¿Tenés<br>un proyecto<br>en mente?</p>
      <p class="sub">Contanos qué necesitás construir o automatizar. Te respondemos en menos de 24 hs con una propuesta clara.</p>
      <div class="pills">
        <span class="pill">veta.systems</span>
        <span class="pill">Mar del Plata</span>
      </div>
    </div>
    <div class="bottom">
      <div class="logo">
        <div class="logo-sq">
          <svg width="18" height="20" viewBox="0 0 18 20" fill="none"><polygon points="3,20 8.5,3 10.5,3 6.5,20" fill="white"/></svg>
        </div>
        <span class="logo-text">VETA</span>
      </div>
      <span class="handle">@veta.systems</span>
    </div>
  </div>
</body>
</html>
